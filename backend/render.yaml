# Render.com Blueprint — deploy with "New > Blueprint" pointing at this repo
services:
  - type: web
    name: arkose-content-api
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -m playwright install --with-deps chromium"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arkose-content-db
          property: connectionString

databases:
  - name: arkose-content-db
    plan: free
